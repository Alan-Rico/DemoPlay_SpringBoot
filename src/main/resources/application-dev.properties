server.port=8090

#Spring Data JPA
spring.datasource.url=jdbc:postgresql://localhost:5432/demo-play-db
spring.datasource.username:alan
spring.datasource.password:alan.play

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
